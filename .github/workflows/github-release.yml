name: GitHub Release Assets

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub release tag to upload assets to
        required: true
        type: string

permissions:
  contents: read

jobs:
  windows-exe:
    name: Build Windows standalone EXE
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build one-file executable
        shell: pwsh
        run: .\scripts\build.ps1 -Python python -OneFile

      - name: Prepare release asset
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name || inputs.release_tag }}"
          Copy-Item "dist\CryptDesk.exe" "dist\CryptDesk-$tag-windows-x64.exe"

      - name: Upload standalone executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-standalone-exe
          path: dist/CryptDesk-*-windows-x64.exe

  upload-release-assets:
    name: Upload GitHub release assets
    runs-on: ubuntu-latest
    needs:
      - windows-exe
    permissions:
      contents: write

    steps:
      - name: Download Windows executable
        uses: actions/download-artifact@v5
        with:
          name: windows-standalone-exe
          path: dist/

      - name: Upload asset to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" dist/*-windows-x64.exe --clobber
