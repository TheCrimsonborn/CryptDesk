    <circle cx="500" cy="290" r="8" />
    <circle cx="730" cy="290" r="8" />
    <circle cx="180" cy="470" r="8" />
    <circle cx="400" cy="470" r="8" />
    <circle cx="560" cy="310" r="8" />
    <circle cx="810" cy="310" r="8" />
  </g>
  <g fill="#ffd58b" fill-opacity="0.16">
    <rect x="180" y="120" width="170" height="48" rx="24" />
    <rect x="610" y="120" width="130" height="48" rx="24" />
    <rect x="150" y="520" width="240" height="60" rx="20" />
    <rect x="610" y="470" width="180" height="60" rx="20" />
