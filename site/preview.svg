<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">CryptDesk abstract preview</title>
  <desc id="desc">Stylized network and session geometry used as a decorative background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2138" />
      <stop offset="100%" stop-color="#09121f" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#75e1cd" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffd58b" stop-opacity="0.15" />
